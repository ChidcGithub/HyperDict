name: Android CI/CD

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Get commit hash
      id: commit
      run: echo "short_sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build Debug APK
      run: ./gradlew assembleDebug --stacktrace
      env:
        VERSION_SUFFIX: "+${{ steps.commit.outputs.short_sha }}"

    - name: Build Release APK
      run: ./gradlew assembleRelease --stacktrace
      env:
        VERSION_SUFFIX: "+${{ steps.commit.outputs.short_sha }}"

    - name: Rename APKs with commit hash
      run: |
        cd app/build/outputs/apk/debug
        mv app-debug.apk HyperDict-v0.0.1+${{ steps.commit.outputs.short_sha }}-debug.apk
        cd ../release
        mv app-release-unsigned.apk HyperDict-v0.0.1+${{ steps.commit.outputs.short_sha }}-release.apk

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/HyperDict-v0.0.1+${{ steps.commit.outputs.short_sha }}-debug.apk

    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      with:
        name: app-release
        path: app/build/outputs/apk/release/HyperDict-v0.0.1+${{ steps.commit.outputs.short_sha }}-release.apk

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Get commit hash
      id: commit
      run: echo "short_sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

    - name: Download Release APK
      uses: actions/download-artifact@v4
      with:
        name: app-release
        path: ./

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: HyperDict-v0.0.1+${{ steps.commit.outputs.short_sha }}-release.apk
        body: |
          ## Release Notes

          HyperDict version 0.0.1 - Build ${{ steps.commit.outputs.short_sha }}

          ### Features
          - Offline dictionary with 3.77M+ English-Chinese entries (ECDICT)
          - Online API integration with smart caching
          - Material Design 3 Expressive interface
          - Real-time search suggestions
          - Smooth animations and transitions
          - Dark mode support
          - Clear search functionality

          ### Technical Details
          - Architecture: MVVM
          - UI: Jetpack Compose
          - Minimum SDK: Android 8.0 (API 26)
          - Build: ${{ steps.commit.outputs.short_sha }}

          ### Installation
          1. Download the APK file below
          2. Enable "Install from Unknown Sources" in Android settings
          3. Install the APK
          4. Launch HyperDict

          ### Notes
          - First launch may take a few seconds to initialize the database
          - Internet connection required for online definitions
          - Offline dictionary works without internet

          ---

          Full changelog: https://github.com/ChidcGithub/HyperDict/commits/v0.0.1
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
