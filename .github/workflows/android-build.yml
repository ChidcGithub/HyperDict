name: Android CI/CD

on:
  push:
    branches: [ main, dev ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, dev ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    outputs:
      short_sha: ${{ steps.info.outputs.short_sha }}
      version: ${{ steps.info.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Get build info
        id: info
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          VERSION=$(grep 'versionName' app/build.gradle.kts | sed 's/.*"\(.*\)".*/\1/')
          BUILD_DATE=$(date +'%Y-%m-%d %H:%M:%S UTC')
          echo "short_sha=$SHORT_SHA" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "build_date=$BUILD_DATE" >> $GITHUB_OUTPUT

          # Current commit subject + body
          COMMIT_SUBJECT=$(git log -1 --pretty=format:"%s")
          COMMIT_BODY=$(git log -1 --pretty=format:"%b")
          echo "commit_subject=$COMMIT_SUBJECT" >> $GITHUB_OUTPUT
          {
            echo "commit_body<<__EOF__"
            echo "$COMMIT_BODY"
            echo "__EOF__"
          } >> $GITHUB_OUTPUT

          # Changelog: dev = current commit only; main/tag = since last stable tag
          if [ "$GITHUB_REF" = "refs/heads/dev" ]; then
            {
              echo "changelog<<__EOF__"
              git log -1 --pretty=format:"- %s (%h)"
              echo
              echo "__EOF__"
            } >> $GITHUB_OUTPUT
          else
            LAST_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
            {
              echo "changelog<<__EOF__"
              if [ -z "$LAST_TAG" ]; then
                git log --pretty=format:"- %s (%h)"
              else
                git log --pretty=format:"- %s (%h)" "${LAST_TAG}..HEAD"
              fi
              echo
              echo "__EOF__"
            } >> $GITHUB_OUTPUT
          fi

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        if: github.ref == 'refs/heads/dev'
        run: ./gradlew assembleDebug --stacktrace

      - name: Build Debug and Release APKs
        if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
        run: ./gradlew assembleDebug assembleRelease --stacktrace

      - name: Rename APKs
        id: apk
        run: |
          SHORT_SHA=${{ steps.info.outputs.short_sha }}
          VERSION=${{ steps.info.outputs.version }}

          DEBUG_SRC=$(find app/build/outputs/apk/debug -name "*.apk" | head -1)
          if [ -n "$DEBUG_SRC" ]; then
            DEBUG_DST="app/build/outputs/apk/debug/HyperDict-v${VERSION}+${SHORT_SHA}-debug.apk"
            mv "$DEBUG_SRC" "$DEBUG_DST"
            echo "debug_apk=$DEBUG_DST" >> $GITHUB_OUTPUT
          fi

          RELEASE_SRC=$(find app/build/outputs/apk/release -name "*.apk" | head -1)
          if [ -n "$RELEASE_SRC" ]; then
            RELEASE_DST="app/build/outputs/apk/release/HyperDict-v${VERSION}+${SHORT_SHA}-release.apk"
            mv "$RELEASE_SRC" "$RELEASE_DST"
            echo "release_apk=$RELEASE_DST" >> $GITHUB_OUTPUT
          fi

      - name: Upload Debug APK artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: HyperDict-v${{ steps.info.outputs.version }}+${{ steps.info.outputs.short_sha }}-debug
          path: app/build/outputs/apk/debug/*.apk

      - name: Upload Release APK artifact
        uses: actions/upload-artifact@v4
        if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
        with:
          name: HyperDict-v${{ steps.info.outputs.version }}+${{ steps.info.outputs.short_sha }}-release
          path: app/build/outputs/apk/release/*.apk

  # Dev branch: pre-release showing only current commit
  release-dev:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/dev'
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get build info
        id: info
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          VERSION=$(grep 'versionName' app/build.gradle.kts | sed 's/.*"\(.*\)".*/\1/')
          BUILD_DATE=$(date +'%Y-%m-%d %H:%M:%S UTC')
          COMMIT_SUBJECT=$(git log -1 --pretty=format:"%s")
          {
            echo "commit_body<<__EOF__"
            git log -1 --pretty=format:"%b"
            echo
            echo "__EOF__"
          } >> $GITHUB_OUTPUT
          echo "short_sha=$SHORT_SHA" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "build_date=$BUILD_DATE" >> $GITHUB_OUTPUT
          echo "commit_subject=$COMMIT_SUBJECT" >> $GITHUB_OUTPUT

      - name: Download Debug APK
        uses: actions/download-artifact@v4
        with:
          name: HyperDict-v${{ needs.build.outputs.version }}+${{ needs.build.outputs.short_sha }}-debug
          path: ./apk

      - name: Delete previous dev release and tag
        run: |
          gh release delete dev-latest --yes 2>/dev/null || true
          git push origin :refs/tags/dev-latest 2>/dev/null || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create dev pre-release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: dev-latest
          name: "Dev Build v${{ steps.info.outputs.version }}+${{ steps.info.outputs.short_sha }}"
          prerelease: true
          files: ./apk/*.apk
          body: |
            ## Dev Build

            > This is an automated development build from the `dev` branch. Not intended for production use.

            **Version:** v${{ steps.info.outputs.version }}+${{ steps.info.outputs.short_sha }}
            **Branch:** dev
            **Date:** ${{ steps.info.outputs.build_date }}

            ## Commit

            **${{ steps.info.outputs.commit_subject }}**

            ${{ steps.info.outputs.commit_body }}

            ## Installation

            1. Download the APK file below
            2. Enable "Install from Unknown Sources" in Android settings
            3. Install the APK

            ---
            Commit: ${{ steps.info.outputs.short_sha }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Main branch / tag: stable release showing full changelog since last stable tag
  release-stable:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get build info
        id: info
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          VERSION=$(grep 'versionName' app/build.gradle.kts | sed 's/.*"\(.*\)".*/\1/')
          BUILD_DATE=$(date +'%Y-%m-%d %H:%M:%S UTC')
          echo "short_sha=$SHORT_SHA" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "build_date=$BUILD_DATE" >> $GITHUB_OUTPUT

          # Changelog: all commits since last stable tag (excluding dev-latest tags)
          LAST_TAG=$(git tag --sort=-creatordate | grep -E '^v[0-9]' | head -1 2>/dev/null || echo "")
          {
            echo "changelog<<__EOF__"
            if [ -z "$LAST_TAG" ]; then
              git log --pretty=format:"- %s (%h)"
            else
              git log --pretty=format:"- %s (%h)" "${LAST_TAG}..HEAD"
            fi
            echo
            echo "__EOF__"
          } >> $GITHUB_OUTPUT
          echo "last_tag=$LAST_TAG" >> $GITHUB_OUTPUT

      - name: Download Debug APK
        uses: actions/download-artifact@v4
        with:
          name: HyperDict-v${{ needs.build.outputs.version }}+${{ needs.build.outputs.short_sha }}-debug
          path: ./apk

      - name: Download Release APK
        uses: actions/download-artifact@v4
        with:
          name: HyperDict-v${{ needs.build.outputs.version }}+${{ needs.build.outputs.short_sha }}-release
          path: ./apk

      - name: Create stable release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || format('stable-{0}', steps.info.outputs.short_sha) }}
          name: "HyperDict v${{ steps.info.outputs.version }}+${{ steps.info.outputs.short_sha }}"
          prerelease: false
          files: ./apk/*.apk
          body: |
            # HyperDict v${{ steps.info.outputs.version }}

            **Version:** v${{ steps.info.outputs.version }}+${{ steps.info.outputs.short_sha }}
            **Branch:** main
            **Date:** ${{ steps.info.outputs.build_date }}
            ${{ steps.info.outputs.last_tag != '' && format('**Since:** {0}', steps.info.outputs.last_tag) || '' }}

            ## Changelog

            ${{ steps.info.outputs.changelog }}

            ## Features

            - Offline dictionary with 3.77M+ English-Chinese entries (ECDICT)
            - Online API integration with intelligent caching (7-day validity)
            - Material Design 3 Expressive interface with smooth animations
            - Real-time search suggestions and auto-completion
            - Dark mode support with dynamic color system

            ## Requirements

            - Android 8.0 (API 26) or higher
            - ~850 MB storage space

            ## Installation

            1. Download the APK file below
            2. Enable "Install from Unknown Sources" in Android settings
            3. Install the APK and launch HyperDict

            ---

            **Full changelog:** https://github.com/ChidcGithub/HyperDict/compare/${{ steps.info.outputs.last_tag }}...v${{ steps.info.outputs.version }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
