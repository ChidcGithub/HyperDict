name: Android CI/CD

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Get commit hash
      id: commit
      run: echo "short_sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build Debug APK
      run: ./gradlew assembleDebug --stacktrace
      env:
        VERSION_SUFFIX: "+${{ steps.commit.outputs.short_sha }}"

    - name: Build Release APK
      run: ./gradlew assembleRelease --stacktrace
      env:
        VERSION_SUFFIX: "+${{ steps.commit.outputs.short_sha }}"

    - name: Rename APKs with commit hash
      run: |
        cd app/build/outputs/apk/debug
        mv app-debug.apk HyperDict-v0.0.1+${{ steps.commit.outputs.short_sha }}-debug.apk
        cd ../release
        mv app-release-unsigned.apk HyperDict-v0.0.1+${{ steps.commit.outputs.short_sha }}-release.apk

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/HyperDict-v0.0.1+${{ steps.commit.outputs.short_sha }}-debug.apk

    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      with:
        name: app-release
        path: app/build/outputs/apk/release/HyperDict-v0.0.1+${{ steps.commit.outputs.short_sha }}-release.apk

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Get commit hash
      id: commit
      run: echo "short_sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

    - name: Download Release APK
      uses: actions/download-artifact@v4
      with:
        name: app-release
        path: ./

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: HyperDict-v0.0.1+${{ steps.commit.outputs.short_sha }}-release.apk
        generate_release_notes: true
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
